[log]
level = "info" # debug, info, warn, error

# Global Providers
[[providers]]
name = "gemini"

# Projects Configuration
[[projects]]
name = "jarvis"

[projects.agent]
type = "antigravity"
provider_refs = ["antigravity"]

[projects.agent.options]
work_dir = "/root/agent"
mode = "yolo"
# model = "gemini-2.5-flash"
cmd = "agy" 
# timeout_mins = 30

# Platforms bound to the project
# ==== Slack ====
[[projects.platforms]]
type = "slack"

[projects.platforms.options]
bot_token = "${SLACK_BOT_TOKEN}" # "xoxb-your-bot-token"
app_token = "${SLACK_APP_TOKEN}" # "xapp-your-app-level-token"
allow_from = "*"  # Allowed Slack user IDs / 允许的 Slack 用户 ID
share_session_in_channel = false  # If true, all users in a channel share one agent session / 频道共享会话
session_scope = "thread"  # Session granularity: "user" (default, per channel+user) |
                        # "channel" (one session per channel, same as share_session_in_channel) |
                        # "thread" (one session per Slack thread — a new top-level message starts
                        #  a fresh session, replies in the same thread continue it).

