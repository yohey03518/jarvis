services:
  agent:
    build: .
    volumes:
      - ./config:/root/.cc-connect
      - ${WORKSPACE_HOST_PATH}:/root/agent
      - ./.gemini:/root/.gemini
      - ${WORKSPACE_SSH_KEY_PATH}:/tmp/ssh_key:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - TZ=${TZ}
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - NGINX_ENVSUBST_FILTER=^(DOMAIN_NAME|CERT_DOMAIN)$$
      - TZ=${TZ}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - agent
    restart: unless-stopped

