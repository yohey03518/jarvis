services:
  agent:
    build: .
    volumes:
      - ./config:/root/.cc-connect
      - .:/root/agent
      - ./.gemini:/root/.gemini
    env_file:
      - .env
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - agent
    restart: unless-stopped
