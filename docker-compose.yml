services:
  agent:
    build: .
    volumes:
      - ./config:/root/.cc-connect
      - .:/root/agent
      - ./.gemini:/root/.gemini
    env_file:
      - .env
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - NGINX_ENVSUBST_FILTER=^(DOMAIN_NAME|CERT_DOMAIN)$$
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - agent
    restart: unless-stopped
